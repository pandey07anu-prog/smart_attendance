<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance Dashboard</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        h1 {
            color: #222;
            margin-top: 20px;
        }

        .container {
            margin-top: 20px;
        }

        img {
            border: 3px solid #444;
            border-radius: 10px;
        }

        .info {
            margin-top: 15px;
            font-size: 18px;
            color: #555;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }

        code {
            background: #ddd;
            padding: 4px 8px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <h1>🎯 Smart Attendance System</h1>

    <div class="container">
        <p>Live webcam feed:</p>
        <img src="{{ url_for('video_feed') }}" width="640" height="480">
        
        <div class="info">
            Attendance is logged in <code>attendance.csv</code>
        </div>

        <div class="status">
            Blink once to mark attendance ✅
        </div>
    </div>

</body>
</html>
